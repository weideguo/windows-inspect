<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .stroke-style {
        fill: none;
        stroke: #0078D7; /* 深海军蓝 */
        stroke-width: 12;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: url(#sketchy); /* 应用手绘滤镜 */
      }
      
      .fill-style {
        fill: #0078D7; /* Windows 标准蓝，稍微调亮一点以配合手绘感 */
        stroke: none;
        filter: url(#sketchy);
        opacity: 0.9;
      }
    </style>
  </defs>

  <!-- 背景透明 -->
  <rect width="100%" height="100%" fill="transparent" />

  <g transform="translate(256, 256)">
    
    <!-- 1. 放大镜手柄 (位于底层) -->
    <g class="stroke-style">
      <!-- 手柄主体 -->
      <path d="M 130 130 L 210 210" stroke-width="24" />
      <!-- 手柄与镜框连接的细节线 -->
      <path d="M 115 115 L 145 145" stroke-width="6" /> 
    </g>

    <!-- 2. 放大镜镜框 (双层圆环) -->
    <g class="stroke-style">
      <!-- 外圈 -->
      <circle cx="0" cy="0" r="190" stroke-width="14" />
      <!-- 内圈 -->
      <circle cx="0" cy="0" r="170" stroke-width="10" />
    </g>

    <!-- 3. Windows 11 Logo (四个方块) -->
    <g class="fill-style">
      <!-- 左上块 -->
      <path d="M -75 -75 L -2 -75 L -2 -2 L -75 -2 Z" />
      <!-- 右上块 -->
      <path d="M 2 -75 L 75 -75 L 75 -2 L 2 -2 Z" />
      <!-- 左下块 -->
      <path d="M -75 2 L -2 2 L -2 75 L -75 75 Z" />
      <!-- 右下块 -->
      <path d="M 2 2 L 75 2 L 75 75 L 2 75 Z" />
    </g>
    
  </g>
</svg>