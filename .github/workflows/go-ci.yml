name: Go Release (Windows)

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build Binary (${{ matrix.goos }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0 
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          GIT_COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
                    
          BINARY_NAME="windows_execution.exe"

          echo "Building ${BINARY_NAME} version ${VERSION} (commit: ${GIT_COMMIT}, built: ${BUILD_TIME})"
          go build -o $BINARY_NAME
          
          file $BINARY_NAME || true
          
          echo "BINARY_NAME=$BINARY_NAME" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          make_latest: true
          files: ${{ env.BINARY_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
